<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=pacifico&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>instagram</title>
 <boody>
<style>
    body {
        margin: 0;
        font-family: arial, sans-serif;
        background: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        background-color: #fff;
        padding: 40px;
        width: 300px;
        border-radius: 12px;
        text-align: center;
        box-shadow: 0 0px 15px rgba(0, 0, 0, 0.1);
    }

    .logo {
        font-size: 28px;
        font-weight: bold;
        margin-bottom: 6px;
    }

    .logo-text {
        font-family: 'lobster', cursive;
        font-size: 42px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
    }

    button {
        width: 100%;
        padding: 10px;
        background-color: #3897f0;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
    }

    .password-box {
        position: relative;
        width: 100%;
    }

    .password-box input {
        width: 105%;
        margin: 8px 0;
        padding: 12px;
        padding-right: 40px;
        border: 1px solid #ccc;
        border-radius: 6px;
        box-sizing: border-box;
    }

    .toggle {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 16px;
    }

    button:hover {
        opacity: 0.9;
    }

    .footer {
        margin-top: 15px;
        font-size: 12px;
        color: gray;
    }
</style>
</head>


<body>  
      <div class="container">
        <h1 class="logo-text">instagram</h1>
        
        <form 
        action="http://localhost:3000/login" method="post">
            <input type="text" name="username" placeholder="Username" required>
           <div class="password-box">
  <input type="password" id="password" name="password" placeholder="Password" required>
  <span class="toggle" onclick="togglePassword()">👁</span>
</div>
  
        <button type="submit">Login</button>
        </form>
        
        <script>
function togglePassword() {
  var passwordInput = document.getElementById("password");

  if (passwordInput.type === "password") {
    passwordInput.type = "text";
  } else {
    passwordInput.type = "password";
  }
}
</script>
    
    <div>
        <p class="footer">Don't have an account? <a href="http://localhost:3000/signup">Sign up</a>
        </p>
    </div>
</body>
</html>
